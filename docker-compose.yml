services:
  db:
    image: postgres:16
    container_name: affordable_law_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lawcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawcrm}
      POSTGRES_DB: ${POSTGRES_DB:-law_crm_db}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: affordable_law_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lawcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawcrm}
      POSTGRES_DB: ${POSTGRES_DB:-law_crm_db}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SMTP_HOST: ${SMTP_HOST:-smtp.yandex.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-true}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-for-local-development}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
    ports:
      - "${BACKEND_PUBLIC_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001/api}
    container_name: affordable_law_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PUBLIC_PORT:-5173}:80"

  ollama:
    image: ollama/ollama
    container_name: affordable_law_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "${OLLAMA_PUBLIC_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-init:
    image: ollama/ollama
    container_name: affordable_law_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama list | grep -q \"^$${OLLAMA_MODEL}[[:space:]]\" ||
      ollama pull \"$${OLLAMA_MODEL}\""
    restart: "no"

volumes:
  pg_data:
    name: affordable_law_pg_data
  ollama_data:
    name: affordable_law_ollama_data
